name: Docker image smoke test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment image
        run: docker build -t letta-code-server-deployment:smoke .

      - name: Verify runtime tools and channel installs
        run: |
          set -euo pipefail

          docker run --rm letta-code-server-deployment:smoke sh -lc '
            set -eu

            test "${LETTA_PACKAGE_MANAGER:-}" = "bun"

            command -v bun
            command -v node
            command -v npm
            command -v git
            command -v python
            command -v python3
            command -v curl
            command -v wget
            command -v jq
            command -v cron
            command -v crontab
            command -v ps
            command -v top
            command -v free
            command -v pgrep
            command -v ip
            command -v ss
            command -v ping
            command -v dig
            command -v nslookup
            command -v lsof
            command -v nc
            command -v file
            command -v zip
            command -v unzip
            command -v less

            bun --version
            node --version
            npm --version
            python --version
            python3 --version
            letta --version
            cron
            crontab -l || test "$?" = "1"
            ps -p 1 -o pid=,comm=
            ip addr show lo
            ping -c 1 127.0.0.1
            file /bin/sh

            letta channels install telegram
            letta channels install discord
            letta channels install slack
            letta channels install whatsapp
          '
